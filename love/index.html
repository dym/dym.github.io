<!DOCTYPE html>

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        #terminal {
            white-space: pre-wrap;
            width: 80%;
            max-width: 800px;
            text-shadow: 0 0 5px #00ff66;
            margin-bottom: 10px;
        }
        .input-line {
            display: flex;
            width: 80%;
            max-width: 800px;
            font-size: 1.1em;
        }
        .prompt {
            color: #5dade2;
            margin-right: 10px;
            white-space: nowrap;
        }
        input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
        }
        .heart { color: #ff3366; text-shadow: 0 0 15px #ff3366; }
        .system-msg { color: #f1c40f; }
        .audio-msg { color: #cc66ff; }
    </style>
